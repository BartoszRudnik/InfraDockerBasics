name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  AZURE_RG: rg-infra-docker-basics

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: APP_VERSION=${{ github.sha }}

      - name: Set image output
        id: image
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE" >> $GITHUB_OUTPUT

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Staging
        run: |
          az containerapp update \
            --name ca-backend-staging \
            --resource-group ${{ env.AZURE_RG }} \
            --image ${{ needs.build-and-push.outputs.image }} \
            --set-env-vars NODE_ENV=staging PORT=3000

      - name: Verify Staging
        run: |
          URL=$(az containerapp show \
            --name ca-backend-staging \
            --resource-group ${{ env.AZURE_RG }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Staging URL: https://$URL"
          sleep 15
          curl -f "https://$URL/health" || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    environment: production
    env:
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Production
        run: |
          az containerapp update \
            --name ca-backend \
            --resource-group ${{ env.AZURE_RG }} \
            --image ${{ needs.build-and-push.outputs.image }} \
            --set-env-vars NODE_ENV=production PORT=3000

      - name: Verify Production
        run: |
          URL=$(az containerapp show \
            --name ca-backend \
            --resource-group ${{ env.AZURE_RG }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Production URL: https://$URL"
          sleep 15
          curl -f "https://$URL/health" || exit 1
